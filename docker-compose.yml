services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: litkg-postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: litkg-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  grobid:
    image: lfoppiano/grobid:0.8.0
    container_name: litkg-grobid
    restart: unless-stopped
    ports:
      - "8070:8070"

  api:
    build:
      context: ./app
    container_name: litkg-api
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/data
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - grobid
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080

  worker_parse:
    build:
      context: ./app
    container_name: litkg-worker-parse
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/data
    depends_on:
      - postgres
      - redis
      - grobid
    command: celery -A app.celery_app worker -Q parse --concurrency=4 --prefetch-multiplier=1 --loglevel=INFO

  worker_extract:
    build:
      context: ./app
    container_name: litkg-worker-extract
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/data
    depends_on:
      - postgres
      - redis
    command: celery -A app.celery_app worker -Q extract --concurrency=1 --prefetch-multiplier=1 --loglevel=INFO

  frontend:
    build:
      context: ./frontend
    container_name: litkg-frontend
    restart: unless-stopped
    environment:
      API_BASE_URL: http://api:8080
    ports:
      - "8501:8501"
    depends_on:
      - api
